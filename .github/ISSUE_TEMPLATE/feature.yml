name: Feature
description: A new capability or user-visible change
title: "[Feature] "
labels: ["feature", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for anything that adds or changes user-visible behavior.
        Claude Code reads this Issue as the single source of truth for implementation.

  - type: textarea
    id: user-story
    attributes:
      label: User Story
      description: "As a ... I want ... so that ..."
      placeholder: "As Jo, I want X so that Y."
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Bullet list. Testable. Each bullet becomes a Playwright E2E test name.
      placeholder: |
        - Given <state>, when <action>, then <observable outcome>
        - Given <state>, when <action>, then <observable outcome>
    validations:
      required: true

  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of Scope
      description: Explicit list of things NOT to do in this Issue. Prevents scope creep.
      placeholder: |
        - Not touching X
        - No refactor of Y
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "P0 blocking, ship today"
        - "P1 next batch"
        - "P2 when capacity allows"
        - "P3 nice to have"
    validations:
      required: true

  - type: textarea
    id: technical-notes
    attributes:
      label: Technical Notes (optional)
      description: Hints on layer, data model, API shape. Builder may override if evidence justifies.
      placeholder: |
        - Expected in `lib/...`
        - Schema change needed in `...`
    validations:
      required: false

  - type: textarea
    id: visual-qa-hint
    attributes:
      label: Visual QA Hint
      description: Click-path Jo should follow on the Vercel Preview URL to verify.
      placeholder: "Navigate to /foo, click Bar, verify Baz appears with label 'Quux'."
    validations:
      required: true
