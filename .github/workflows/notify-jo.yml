# Notify Jo (Post-Merge Visual QA).
#
# Trigger = `workflow_run` on "PR Gates" completion, NOT `pull_request: closed` and
# NOT `push: main`. Reason: the foundation auto-merges with GITHUB_TOKEN
# (`gh pr merge --auto` in gates-green). GitHub's recursion guard means a merge
# performed by GITHUB_TOKEN does NOT trigger downstream `pull_request` OR `push`
# workflows (docs: "If a workflow run pushes code using the repository's
# GITHUB_TOKEN, a new workflow will not run ..."). That is exactly why the old
# `pull_request: closed` trigger never fired (Issue #15).
#
# `workflow_run` is NOT suppressed — "PR Gates" is started by a real user's PR push.
# When it finishes green, gates-green has just enabled auto-merge, so we resolve the
# associated PR and poll until it actually merges, then notify. No PAT, no new secret.
name: Notify Jo (Post-Merge Visual QA)

on:
  workflow_run:
    workflows: ["PR Gates"]
    types: [completed]

concurrency:
  group: notify-jo-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  notify:
    # Only successful PR Gates runs can have enabled auto-merge.
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      deployments: read
      contents: read
      issues: write
    steps:
      - name: Resolve PR and wait for the auto-merge to land
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const headSha = context.payload.workflow_run.head_sha;
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner, repo: context.repo.repo, commit_sha: headSha,
            });
            const pr0 = prs[0];
            if (!pr0) { core.info('No PR for this commit — skipping.'); core.setOutput('merged', 'false'); return; }
            // gates-green enables --auto just before the run completes; poll until merged.
            let pr = pr0;
            for (let i = 0; i < 12; i++) {
              const { data } = await github.rest.pulls.get({
                owner: context.repo.owner, repo: context.repo.repo, pull_number: pr0.number,
              });
              pr = data;
              if (pr.merged) break;
              if (pr.state === 'closed' && !pr.merged) { core.info('PR closed unmerged — skipping.'); core.setOutput('merged', 'false'); return; }
              await new Promise(r => setTimeout(r, 10000));
            }
            if (!pr.merged) { core.info('PR not merged within timeout — no auto-merge, skipping.'); core.setOutput('merged', 'false'); return; }
            core.setOutput('merged', 'true');
            core.setOutput('number', String(pr.number));
            core.setOutput('title', pr.title || '');
            core.setOutput('body', pr.body || '');
            core.setOutput('url', pr.html_url);
            core.setOutput('head_ref', pr.head.ref || '');
            core.setOutput('merge_sha', pr.merge_commit_sha || headSha);

      - name: Close linked issues from PR body + branch
        if: steps.pr.outputs.merged == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BODY: ${{ steps.pr.outputs.body }}
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          set +e
          # Issue numbers from PR body (closes/fixes/resolves #N) and branch (issue-N).
          {
            printf '%s\n' "$PR_BODY" | grep -oiE '(close[sd]?|fix(e[sd])?|resolve[sd]?)[[:space:]]+#[0-9]+' | grep -oE '[0-9]+'
            printf '%s\n' "$HEAD_REF" | grep -oE 'issue[-/]([0-9]+)' | grep -oE '[0-9]+'
          } | sort -u > /tmp/issue_ids.txt
          if [ ! -s /tmp/issue_ids.txt ]; then
            echo "No linked issues found. Skipping."
            exit 0
          fi
          while read -r ID; do
            [ -z "$ID" ] && continue
            echo "Closing issue #$ID..."
            gh issue close "$ID" --reason completed --comment "Auto-closed by notify-jo after PR #${PR_NUMBER} merged." || echo "  (issue #$ID may not exist or already closed)"
          done < /tmp/issue_ids.txt

      - name: Gather production deployment URL
        if: steps.pr.outputs.merged == 'true'
        id: info
        uses: actions/github-script@v7
        with:
          script: |
            const head_sha = '${{ steps.pr.outputs.merge_sha }}';
            const deployments = await github.rest.repos.listDeployments({
              owner: context.repo.owner, repo: context.repo.repo, sha: head_sha,
            });
            let prod_url = '';
            for (const dep of deployments.data) {
              const statuses = await github.rest.repos.listDeploymentStatuses({
                owner: context.repo.owner, repo: context.repo.repo, deployment_id: dep.id,
              });
              const success = statuses.data.find(s => s.state === 'success');
              if (success && success.environment_url) { prod_url = success.environment_url; break; }
            }
            // Fallback: repo homepage field (set by Builder to the Vercel Production URL).
            if (!prod_url) {
              const repo = await github.rest.repos.get({ owner: context.repo.owner, repo: context.repo.repo });
              if (repo.data.homepage) prod_url = repo.data.homepage;
            }
            core.setOutput('prod_url', prod_url || 'pending');
            core.setOutput('head_sha', head_sha.slice(0, 7));

      - name: Update Notion task
        if: steps.pr.outputs.merged == 'true'
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          if [ -z "${NOTION_API_KEY}" ] || [ -z "${NOTION_DATABASE_ID}" ]; then
            echo "Notion secrets not configured, skipping."
            exit 0
          fi
          curl -sS -X POST https://api.notion.com/v1/pages \
            -H "Authorization: Bearer ${NOTION_API_KEY}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg db "$NOTION_DATABASE_ID" \
              --arg title "Merged: ${{ steps.pr.outputs.title }}" \
              --arg pr "${{ steps.pr.outputs.url }}" \
              --arg prod "${{ steps.info.outputs.prod_url }}" \
              --arg sha "${{ steps.info.outputs.head_sha }}" \
              '{
                parent: { database_id: $db },
                properties: {
                  Name: { title: [{ text: { content: $title } }] },
                  Status: { status: { name: "Merged - Visual QA" } },
                  "PR URL": { url: $pr },
                  "Preview URL": { url: $prod },
                  SHA: { rich_text: [{ text: { content: $sha } }] }
                }
              }')"

      - name: Send Pushover push
        if: steps.pr.outputs.merged == 'true'
        env:
          PUSHOVER_APP_TOKEN: ${{ secrets.PUSHOVER_APP_TOKEN }}
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
        run: |
          if [ -z "${PUSHOVER_APP_TOKEN}" ] || [ -z "${PUSHOVER_USER_KEY}" ]; then
            echo "Pushover secrets not configured, skipping."
            exit 0
          fi
          curl -sS https://api.pushover.net/1/messages.json \
            --form-string "token=${PUSHOVER_APP_TOKEN}" \
            --form-string "user=${PUSHOVER_USER_KEY}" \
            --form-string "title=Merged: PR #${{ steps.pr.outputs.number }}" \
            --form-string "message=${{ steps.pr.outputs.title }} - merged to main, Visual QA on production." \
            --form-string "url=${{ steps.info.outputs.prod_url }}" \
            --form-string "url_title=Open Production" \
            --form-string "priority=0"
