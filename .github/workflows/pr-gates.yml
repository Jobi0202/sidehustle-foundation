name: PR Gates
on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-gates-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  claude-review:
    name: Claude Review (Gate 2)
    needs: [lint, typecheck, unit, e2e]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: claude_review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            /review-pr ${{ github.event.pull_request.number }}

            Apply the 6-criteria canon strictly per @./.claude/rules/review.md.
            Read the linked Issue, the full diff, and full file contents of every changed file.
            Emit the verdict in the exact format. Post it as a PR comment via `gh pr comment ${{ github.event.pull_request.number }} --body "..."` — this is mandatory, not optional.
            Exit with non-zero status if any criterion is FAIL or there are BLOCKING findings.
          claude_args: "--model claude-haiku-4-5-20251001 --max-turns 25"

      - name: Post Gate 2 status to PR (if action did not)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ github.event.pull_request.number }}
          STATUS="${{ steps.claude_review.outcome }}"
          gh pr comment "$PR" --body "## Gate 2 — Claude Review status: $STATUS (action-level). See action log + above verdict for details." || true

  codex-adversarial:
    name: Codex Adversarial Review (Gate 3)
    needs: [claude-review]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install Claude Code CLI + Codex plugin
        run: |
          npm install -g @anthropic-ai/claude-code@latest
          claude /plugin marketplace add openai/codex-plugin-cc || true
          claude /plugin install codex@openai || true
      - name: Run Codex adversarial review
        id: adv
        run: |
          set +e
          claude -p "/codex:adversarial-review on PR #${{ github.event.pull_request.number }} (apply @./.claude/rules/review.md, post verdict as PR comment, exit 1 on FAIL)" 2>&1 | tee /tmp/adversarial.log
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          tail -n 200 /tmp/adversarial.log || true
          exit 0
      - name: Post Codex verdict to PR
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ steps.pr.outputs.result }}
          {
            echo "## Gate 3 — Codex Adversarial Review"
            echo ""
            echo "Exit code: ${{ steps.adv.outputs.exit_code }}"
            echo ""
            echo '```'
            tail -n 100 /tmp/adversarial.log 2>/dev/null || echo 'No log captured.'
            echo '```'
          } > /tmp/verdict.md
          gh pr comment "$PR" --body-file /tmp/verdict.md || true

      - name: Enforce gate verdict
        run: |
          if [ "${{ steps.adv.outputs.exit_code }}" != "0" ]; then
            echo "Codex adversarial returned non-zero exit. Gate 3 FAILED."
            exit 1
          fi
          echo "Gate 3 PASSED."

  gates-green:
    name: Gates Green
    if: always()
    needs: [lint, typecheck, unit, e2e, claude-review, codex-adversarial]
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate result (alls-green)
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
