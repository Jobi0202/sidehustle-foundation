# PR Gates — THIN CALLER of the shared reusable pipeline.
#
# The full pipeline (workflow-lint, lint, typecheck, unit, e2e, claude-review [Gate 2/
# DeepSeek], codex-adversarial [Gate 3/OpenAI], architect-gate [tier-2/3 Opus], gates-green)
# lives ONCE in the public, YAML-only repo Jobi0202/sidehustle-ci and is consumed here via
# `workflow_call`. A central change (e.g. the post-15.06 Max-Switch) propagates to every
# caller with no edit here — that is the whole point of @main.
#
# The name is kept as "PR Gates" so notify-jo.yml's `workflow_run` trigger still matches.
# secrets: inherit passes this repo's secrets (DEEPSEEK_API_KEY, OPENAI_API_KEY,
# CLAUDE_CODE_OAUTH_TOKEN, optional ANTHROPIC_API_KEY / PUSHOVER_*) to the reusable workflow.
# The called workflow runs in THIS repo's context, so its per-job checkout reads this repo's
# scripts/classify-tier.sh and .claude/rules/* — the gate logic is unchanged, just relocated.
name: PR Gates

on:
  pull_request:
    # labeled/unlabeled kept so adding/removing `jo-approved` on a tier-3 PR re-runs the
    # gates (the central gates-green re-evaluates the tier-3 schranke). The concurrency
    # group below cancels the now-stale in-progress run.
    types: [opened, synchronize, reopened, ready_for_review, edited, labeled, unlabeled]

concurrency:
  group: pr-gates-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# A called workflow's job permissions are capped by the caller's grant, and the repo
# default is read-only — so the caller MUST grant the union the reusable's jobs request
# (claude-review id-token, codex/architect PR+issue writes, gates-green contents:write for
# the merge), or GitHub fails the run at startup. Each reusable job still narrows to its own
# least-privilege subset.
permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  gates:
    uses: Jobi0202/sidehustle-ci/.github/workflows/pr-gates-reusable.yml@main
    secrets: inherit
