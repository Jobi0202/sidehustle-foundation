name: PR Gates
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-gates-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  claude-review:
    name: Claude Review (Gate 2)
    needs: [lint, typecheck, unit, e2e]
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    env:
      # ROLLBACK-PFAD (deaktiviert seit 2026-06-04, Jo's Standing-Order DeepSeek-Default).
      # Falls Rollback auf Anthropic nötig: untere 5 DeepSeek-Zeilen auskommentieren, untere
      # ANTHROPIC_API_KEY-Zeile aktivieren.
      # ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_BASE_URL: https://api.deepseek.com/anthropic
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.DEEPSEEK_API_KEY }}
      ANTHROPIC_MODEL: deepseek-v4-flash
      ANTHROPIC_DEFAULT_HAIKU_MODEL: deepseek-v4-flash
      CLAUDE_CODE_SUBAGENT_MODEL: deepseek-v4-flash
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code@latest

      - name: Run /review-pr (Gate 2) — stdout to file
        id: claude_review
        run: |
          set +e
          PR=${{ github.event.pull_request.number }}
          claude -p "/review-pr $PR" --model deepseek-v4-flash > /tmp/claude_review.txt 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Post Claude Review verdict to PR
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ github.event.pull_request.number }}
          {
            echo "## Gate 2 — Claude Review"
            echo ""
            echo "Exit code: ${{ steps.claude_review.outputs.exit_code }}"
            echo ""
            echo '<details><summary>Full verdict (stdout)</summary>'
            echo ''
            echo '```'
            cat /tmp/claude_review.txt 2>/dev/null || echo 'No output captured.'
            echo '```'
            echo '</details>'
          } > /tmp/claude_review_comment.md
          gh pr comment "$PR" -F /tmp/claude_review_comment.md || true

      - name: Verify VERDICT format present (Gate 2 format-drift guard)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The /review-pr reviewer posts the canonical VERDICT as a PR
          # comment and emits only a one-line summary to stdout. Accept a
          # VERDICT: line from EITHER surface; fail only if neither has one
          # (true format-drift or the reviewer never posted a verdict).
          PR=${{ github.event.pull_request.number }}
          if grep -qE "^VERDICT:" /tmp/claude_review.txt 2>/dev/null; then
            echo "VERDICT line found in reviewer stdout."
          elif gh pr view "$PR" --repo "${{ github.repository }}" --json comments --jq '.comments[].body' | grep -qE "^VERDICT:"; then
            echo "VERDICT line found in a posted PR comment."
          else
            echo "::error::Gate 2 — no VERDICT: line in reviewer stdout or PR comments. Format-drift. Failing gate."
            exit 1
          fi

      - name: Enforce Gate 2 verdict
        run: |
          if [ "${{ steps.claude_review.outputs.exit_code }}" != "0" ]; then
            echo "Claude Review returned non-zero exit. Gate 2 FAILED."
            exit 1
          fi
          echo "Gate 2 PASSED."

  codex-adversarial:
    name: Codex Adversarial Review (Gate 3)
    needs: [claude-review]
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    env:
      # CLI-Wrapper-Backend (lädt Codex-Plugin). ROLLBACK-PFAD: ANTHROPIC_API_KEY-Zeile aktivieren,
      # DeepSeek-Zeilen auskommentieren. OPENAI_API_KEY bleibt — eigentlicher Codex-Reviewer
      # spricht OpenAI-Responses-API direkt (Cross-Family-Adversarial gegen DeepSeek-Gate-2,
      # Architekt-Verdict 2026-05-17 B).
      # ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_BASE_URL: https://api.deepseek.com/anthropic
      ANTHROPIC_AUTH_TOKEN: ${{ secrets.DEEPSEEK_API_KEY }}
      ANTHROPIC_MODEL: deepseek-v4-flash
      ANTHROPIC_DEFAULT_HAIKU_MODEL: deepseek-v4-flash
      CLAUDE_CODE_SUBAGENT_MODEL: deepseek-v4-flash
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install Claude Code CLI + Codex plugin (hard fail on install error)
        run: |
          set -e
          npm install -g @anthropic-ai/claude-code@latest
          claude /plugin marketplace add openai/codex-plugin-cc
          claude /plugin install codex@openai
          # Verify plugin is actually loaded — install can return 0 silently
          if ! claude /plugin list 2>&1 | grep -qi 'codex'; then
            echo "ERROR: codex plugin install reported success but is not in /plugin list"
            claude /plugin list 2>&1 || true
            exit 1
          fi
          echo "Codex plugin installed and verified."
      - name: Run Codex adversarial review
        id: adv
        run: |
          set +e
          claude -p "/codex:adversarial-review on PR #${{ github.event.pull_request.number }} (apply @./.claude/rules/review.md, post verdict as PR comment, exit 1 on FAIL)" > /tmp/adversarial.log 2>&1
          ec=$?
          echo "exit_code=$ec" >> "$GITHUB_OUTPUT"
          echo "--- Codex stdout (full) ---"
          cat /tmp/adversarial.log
          echo "--- exit code: $ec ---"
          exit 0
      - name: Post Codex verdict to PR
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ github.event.pull_request.number }}
          {
            echo "## Gate 3 — Codex Adversarial Review"
            echo ""
            echo "Exit code: ${{ steps.adv.outputs.exit_code }}"
            echo ""
            echo '<details><summary>Full verdict (stdout)</summary>'
            echo ''
            echo '```'
            cat /tmp/adversarial.log 2>/dev/null || echo 'No log captured.'
            echo '```'
            echo '</details>'
          } > /tmp/codex_verdict.md
          gh pr comment "$PR" -F /tmp/codex_verdict.md || true

      - name: Verify VERDICT format present (Gate 3 format-drift guard)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Codex streams its verdict to stdout (tee'd to adversarial.log) and
          # also posts it as a PR comment. Accept a VERDICT: line from EITHER
          # surface; fail only if neither has one (true format-drift).
          PR=${{ github.event.pull_request.number }}
          if grep -qE "^VERDICT:" /tmp/adversarial.log 2>/dev/null; then
            echo "VERDICT line found in Codex stdout."
          elif gh pr view "$PR" --repo "${{ github.repository }}" --json comments --jq '.comments[].body' | grep -qE "^VERDICT:"; then
            echo "VERDICT line found in a posted PR comment."
          else
            echo "::error::Gate 3 — no VERDICT: line in Codex stdout or PR comments. Format-drift. Failing gate."
            exit 1
          fi

      - name: Enforce gate verdict
        run: |
          if [ "${{ steps.adv.outputs.exit_code }}" != "0" ]; then
            echo "Codex adversarial returned non-zero exit. Gate 3 FAILED."
            exit 1
          fi
          echo "Gate 3 PASSED."

  gates-green:
    name: Gates Green
    if: always() && github.event.pull_request.draft == false
    needs: [lint, typecheck, unit, e2e, claude-review, codex-adversarial]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Aggregate result (alls-green)
        id: alls
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}

      - name: Squash-merge PR (only after all gates green)
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ github.event.pull_request.number }}
          echo "All gates green. Merging PR #$PR via squash (no local checkout, --repo flag)..."
          gh pr merge "$PR" --repo ${{ github.repository }} --squash --delete-branch
