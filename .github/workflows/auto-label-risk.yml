# 3-Tier risk classifier (P1b). Stamps EXACTLY ONE label tier-1 / tier-2 / tier-3 on
# every PR, replacing the old binary `risk:requires-review`:
#   tier-1 — routine / additive: the normal gate strecke decides.
#   tier-2 — technically risky (auth/rls/payments code, or destructive/locking DDL):
#            the `architect-gate` job (Anthropic Opus) must pass. No Jo ping.
#   tier-3 — business/legal risk (money movement, DROP TABLE / TRUNCATE / DELETE without
#            WHERE, consent / GDPR Art-9): blocked in gates-green unless `jo-approved`.
# All classification lives in scripts/classify-tier.sh (per-statement, conservative) so it
# is unit-tested (src/ci/tier-classifier.test.ts) and shared, not duplicated in YAML.
name: Auto-label risk

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Cancel an older classify run when a new push arrives, so a stale run cannot finish
# late and apply a wrong tier label (e.g. strip tier-3) to the current PR head.
concurrency:
  group: auto-label-risk-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  classify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify changed files into a tier
        id: classify
        run: |
          base='${{ github.event.pull_request.base.sha }}'
          head='${{ github.event.pull_request.head.sha }}'
          files="$(git diff --name-only "$base" "$head")"
          echo "Changed files:"; printf '%s\n' "$files"
          tier="$(printf '%s\n' "$files" | bash scripts/classify-tier.sh)"
          echo "Resolved tier: $tier"
          echo "tier=$tier" >> "$GITHUB_OUTPUT"

      - name: Ensure tier labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create tier-1 --color 0E8A16 --description "Routine/additive — the gate strecke decides" --force
          gh label create tier-2 --color D93F0B --description "Technically risky — architect-gate must pass" --force
          gh label create tier-3 --color B60205 --description "Business/legal risk — needs jo-approved" --force

      - name: Apply exactly one tier label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          TIER: ${{ steps.classify.outputs.tier }}
          EVENT_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          # Current-head guard: never mutate labels if this run is for an outdated head
          # (a slow/older run completing after a newer push). Belt-and-suspenders with the
          # workflow-level concurrency cancellation.
          current_head="$(gh pr view "$PR" --repo "${{ github.repository }}" --json headRefOid --jq .headRefOid)"
          if [ "$current_head" != "$EVENT_HEAD" ]; then
            echo "Run head $EVENT_HEAD is no longer the PR head ($current_head) — stale run, skipping label mutation."
            exit 0
          fi
          for t in tier-1 tier-2 tier-3; do
            if [ "$t" = "$TIER" ]; then
              gh pr edit "$PR" --add-label "$t"
            else
              gh pr edit "$PR" --remove-label "$t" || true
            fi
          done
          echo "Labeled PR #$PR as $TIER."
