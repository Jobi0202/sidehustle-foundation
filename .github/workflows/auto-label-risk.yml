# 3-Tier risk classifier (P1b). Stamps EXACTLY ONE label tier-1 / tier-2 / tier-3 on
# every PR, replacing the old binary `risk:requires-review`:
#   tier-1 — routine / additive: the normal gate strecke decides.
#   tier-2 — technically risky (auth/rls/payments code, or destructive/locking DDL):
#            the `architect-gate` job (Anthropic Opus) must pass. No Jo ping.
#   tier-3 — business/legal risk (money movement, DROP TABLE / DELETE without WHERE,
#            consent / GDPR Art-9): blocked in gates-green unless `jo-approved`, Jo pinged.
# SQL heuristics are line-based and deliberately conservative ("im Zweifel tier-3").
name: Auto-label risk

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  classify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify changed files into a tier
        id: classify
        run: |
          base='${{ github.event.pull_request.base.sha }}'
          head='${{ github.event.pull_request.head.sha }}'
          files="$(git diff --name-only "$base" "$head")"
          echo "Changed files:"; printf '%s\n' "$files"

          sql_files="$(printf '%s\n' "$files" | grep -E '(^|/)migrations/.*\.sql$' || true)"
          sql_up=""
          if [ -n "$sql_files" ]; then
            sql_up="$(printf '%s\n' "$sql_files" | while IFS= read -r f; do [ -n "$f" ] && [ -f "$f" ] && cat "$f"; done | tr '[:lower:]' '[:upper:]')"
          fi

          tier="tier-1"

          # ---- tier-2: structural risk paths ----
          if printf '%s\n' "$files" | grep -qE '(^|/)(auth|rls|payments)/'; then
            tier="tier-2"; echo "tier-2: auth/rls/payments path"
          fi
          # ---- tier-2: destructive / locking DDL in a migration ----
          if printf '%s' "$sql_up" | grep -qE '\bDROP\b|\bTRUNCATE\b|\bDELETE\b|\bRENAME\b|ALTER[[:space:]].*[[:space:]]TYPE\b|ADD[[:space:]]+CONSTRAINT[^;]*UNIQUE'; then
            tier="tier-2"; echo "tier-2: destructive/locking DDL"
          fi
          # ADD COLUMN ... NOT NULL without DEFAULT locks a populated table.
          if printf '%s' "$sql_up" | grep -qE 'ADD[[:space:]]+COLUMN[^;]*NOT[[:space:]]+NULL' \
             && ! printf '%s' "$sql_up" | grep -qE 'ADD[[:space:]]+COLUMN[^;]*NOT[[:space:]]+NULL[^;]*DEFAULT'; then
            tier="tier-2"; echo "tier-2: ADD COLUMN NOT NULL without DEFAULT"
          fi

          # ---- tier-3 overrides (conservative) ----
          if printf '%s' "$sql_up" | grep -qE 'DROP[[:space:]]+TABLE'; then
            tier="tier-3"; echo "tier-3: DROP TABLE"
          fi
          if printf '%s' "$sql_up" | grep -qE '\bDELETE[[:space:]]+FROM\b' \
             && ! printf '%s' "$sql_up" | grep -qE '\bDELETE[[:space:]]+FROM\b[^;]*WHERE'; then
            tier="tier-3"; echo "tier-3: DELETE without WHERE"
          fi
          if printf '%s\n' "$files" | grep -qE '(^|/)(consent|gdpr|art9)/'; then
            tier="tier-3"; echo "tier-3: consent/GDPR/Art-9 path"
          fi
          if printf '%s\n' "$files" | grep -qE '(^|/)payments/' \
             && printf '%s' "$sql_up" | grep -qE 'TRANSFER|CHARGE|PAYOUT|REFUND|BALANCE'; then
            tier="tier-3"; echo "tier-3: payments money movement"
          fi

          echo "Resolved tier: $tier"
          echo "tier=$tier" >> "$GITHUB_OUTPUT"

      - name: Ensure tier labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create tier-1 --color 0E8A16 --description "Routine/additive — the gate strecke decides" --force
          gh label create tier-2 --color D93F0B --description "Technically risky — architect-gate must pass" --force
          gh label create tier-3 --color B60205 --description "Business/legal risk — needs jo-approved" --force

      - name: Apply exactly one tier label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          TIER: ${{ steps.classify.outputs.tier }}
        run: |
          for t in tier-1 tier-2 tier-3; do
            if [ "$t" = "$TIER" ]; then
              gh pr edit "$PR" --add-label "$t"
            else
              gh pr edit "$PR" --remove-label "$t" || true
            fi
          done
          echo "Labeled PR #$PR as $TIER."
