# Auto-label risk PRs (jo-approved Option C, Welle 1.6 Block G).
# Path-based risk classifier: a PR that touches migrations, auth, payments, RLS,
# or a write API route (POST/PUT/PATCH/DELETE handler) is auto-labeled
# `risk:requires-review`. Branch protection then requires an architect review
# for that label (configured by Jo in repo settings). The label is applied
# automatically — reviewers no longer set it by hand (review.md Criterion 6).
#
# Pluginbar in jede Side-Hustle (Foundation-Repo). Non-risk PRs (UI, specs,
# docs, tests, read-only routes) run No-Touch — the label is removed if a later
# push drops the risk path.
name: Auto-label risk

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  classify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: classify
        run: |
          base='${{ github.event.pull_request.base.sha }}'
          head='${{ github.event.pull_request.head.sha }}'
          files="$(git diff --name-only "$base" "$head")"
          echo "Changed files:"; echo "$files"

          risk=false
          # Structural risk paths: migrations / auth / payments / rls.
          if echo "$files" | grep -qE '(^|/)migrations/.*\.sql$|(^|/)auth/|(^|/)payments/|(^|/)rls/'; then
            risk=true
            echo "Hit: structural risk path"
          fi

          # Write API routes: a changed route handler that exports a mutating verb.
          if [ "$risk" = "false" ]; then
            while IFS= read -r f; do
              [ -n "$f" ] || continue
              [ -f "$f" ] || continue
              case "$f" in
                *route.ts|*route.js|*/api/*)
                  if grep -qE 'export[[:space:]]+(async[[:space:]]+)?function[[:space:]]+(POST|PUT|PATCH|DELETE)\b' "$f"; then
                    risk=true
                    echo "Hit: write API route -> $f"
                    break
                  fi
                  ;;
              esac
            done <<< "$files"
          fi

          echo "risk=$risk" >> "$GITHUB_OUTPUT"

      - name: Ensure label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "risk:requires-review" \
            --color B60205 \
            --description "Touches migrations/auth/payments/rls/write-API — needs an architect review" \
            --force

      - name: Apply or clear label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          if [ "${{ steps.classify.outputs.risk }}" = "true" ]; then
            echo "Risk path hit → labeling PR #$PR"
            gh pr edit "$PR" --add-label "risk:requires-review"
          else
            echo "No risk path → ensuring label is absent on PR #$PR"
            gh pr edit "$PR" --remove-label "risk:requires-review" || true
          fi
