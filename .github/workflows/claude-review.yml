name: Claude Review (Gate 2)
on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  review:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code@latest

      - name: Identify PR number
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prs = context.payload.workflow_run.pull_requests || [];
            if (!prs.length) { core.setFailed('No PR associated'); return; }
            return prs[0].number;
          result-encoding: string

      - name: Run /review-pr in fresh context
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          claude -p "/review-pr ${{ steps.pr.outputs.result }}" --output-format=stream-json > /tmp/review.log
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          tail -n 200 /tmp/review.log || true
          exit 0

      - name: Enforce gate verdict
        run: |
          if [ "${{ steps.review.outputs.exit_code }}" != "0" ]; then
            echo "Claude review returned non-zero exit. Gate 2 FAILED."
            exit 1
          fi
          echo "Gate 2 PASSED."
