name: Auto Rework Trigger
on:
  pull_request:
    types: [labeled]

jobs:
  trigger-builder:
    if: github.event.label.name == 'needs-rework'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Emit repository_dispatch event (builder-rework)
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'builder-rework',
              client_payload: {
                pr_number: context.payload.pull_request.number,
                pr_url: context.payload.pull_request.html_url,
                head_ref: context.payload.pull_request.head.ref,
                head_sha: context.payload.pull_request.head.sha,
                reason: 'CI or review gate reported BLOCKING findings. Read the latest failure comment and fix.'
              }
            });

      - name: Post instruction comment on PR
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## Rework Queued

            The `needs-rework` label was applied. **Builder agent (Claude Code)** should:

            1. Pull latest on branch `${{ github.event.pull_request.head.ref }}`
            2. Read the most recent gate-failure comment on this PR
            3. Address every BLOCKING finding — no scope creep
            4. Run `pnpm verify` locally; must be green
            5. Push. Gates re-run automatically.

            The `needs-rework` label will be removed automatically when you push a new commit.
