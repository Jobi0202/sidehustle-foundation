name: PR Failure Comment
on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  comment:
    if: github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      actions: read
    steps:
      - name: Find PR number
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const prs = run.pull_requests || [];
            if (prs.length === 0) {
              core.setFailed('No PR associated with this workflow run');
              return;
            }
            return prs[0].number;
          result-encoding: string

      - name: Collect failed jobs
        id: jobs
        uses: actions/github-script@v7
        with:
          script: |
            const run_id = context.payload.workflow_run.id;
            const res = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id
            });
            const failed = res.data.jobs.filter(j => j.conclusion === 'failure');
            if (!failed.length) return 'No failed jobs detected.';
            const lines = failed.map(j => {
              const steps = (j.steps || [])
                .filter(s => s.conclusion === 'failure')
                .map(s => `  - step: \`${s.name}\``)
                .join('\n');
              return `**${j.name}** (failed)\n${steps}\nLogs: ${j.html_url}`;
            });
            return lines.join('\n\n');
          result-encoding: string

      - name: Comment on PR
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ steps.pr.outputs.result }}
          body: |
            ## Gate 1 — CI FAILED

            ${{ steps.jobs.outputs.result }}

            **Builder agent:** fix the failures above, run `pnpm verify` locally, then push. CI re-runs automatically. The `needs-rework` label has been applied.

      - name: Add needs-rework label
        uses: actions-ecosystem/action-add-labels@v1
        with:
          number: ${{ steps.pr.outputs.result }}
          labels: needs-rework
